pipeline:
  - name: repeated_pixel_filter
    enabled: true
    params:
      max_hits_per_pixel: 10
      pixel_fields: "y,z"
      round_decimals: 3
  - name: dbscan_cluster_producer
    enabled: true
    params:
      eps_cm: 1.5
      min_samples: 10
      cluster_min_hits: 20
      cluster_max_extent_cm: 8.0
